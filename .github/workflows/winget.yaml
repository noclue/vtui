name: Publish to WinGet

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: Git tag to publish to WinGet (for example v0.2.1)
        required: true
        type: string
  release:
    types: [released]

jobs:
  publish-winget:
    runs-on: windows-latest
    steps:
      - name: Submit to Microsoft Winget
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: noclue.vtui
          # We MUST use zip because cargo-dist uploads zips, not raw exes
          installers-regex: '\.zip$'
          release-tag: ${{ github.event.release.tag_name || github.event.inputs.release-tag }}
          token: ${{ secrets.WINGET_TOKEN }}